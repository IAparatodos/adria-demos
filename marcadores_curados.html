.card:hover{border-color:var(--accent);background:var(--panel2);transform:translateY(-1px)}
.fav{width:19px;height:19px;flex:none;border-radius:5px;background:var(--chip)}
.info{min-width:0;flex:1}
.t{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.u{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

mark{background:rgba(124,92,255,.4);color:#fff;border-radius:3px;padding:0 2px}
.empty{display:none;text-align:center;color:var(--muted);padding:50px}

const $=s=>document.querySelector(s);
let active='__all__';
function host(u){try{return new URL(u).hostname.replace('www.','')}catch(e){return ''}}
function fav(u){const h=host(u);return h?`https://www.google.com/s2/favicons?domain=${h}&sz=64`:''}
function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function hl(t,q){if(!q)return esc(t);const i=t.toLowerCase().indexOf(q.toLowerCase());
 if(i<0)return esc(t);return esc(t.slice(0,i))+'<mark>'+esc(t.slice(i,i+q.length))+'</mark>'+esc(t.slice(i+q.length))}
function renderChips(){
 let h=`<div class="chip ${active==='__all__'?'on':''}" data-c="__all__">Todas <span class="n">${D.items.length}</span></div>`;
 D.cats.forEach(c=>{const n=D.items.filter(i=>i.cat===c).length;
  h+=`<div class="chip ${active===c?'on':''}" data-c="${esc(c)}">${D.icon[c]} ${esc(c)} <span class="n">${n}</span></div>`});
 $('#chips').innerHTML=h;
 document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{active=c.dataset.c;render()})}
function render(){
 const q=$('#q').value.trim(),ql=q.toLowerCase();
 let list=D.items.filter(i=>(active==='__all__'||i.cat===active));
 if(q)list=list.filter(i=>i.title.toLowerCase().includes(ql)||i.url.toLowerCase().includes(ql));
 const cats=D.cats.filter(c=>list.some(i=>i.cat===c));
 $('#groups').innerHTML=cats.map(c=>{
  const cs=list.filter(i=>i.cat===c).map(i=>`
   <a class="card" href="${esc(i.url)}" target="_blank" rel="noopener">
    <img class="fav" loading="lazy" src="${fav(i.url)}" onerror="this.style.visibility='hidden'">
    <div class="info"><div class="t">${hl(i.title,q)}</div>
    <div class="u">${hl(host(i.url)||i.url,q)}</div></div>
    ${i.flag?'<span class="warn">caduca</span>':''}</a>`).join('');
  return `<div class="group"><h3>${D.icon[c]} ${esc(c)} <span class="gn">${list.filter(i=>i.cat===c).length}</span></h3><div class="cards">${cs}</div></div>`
 }).join('');
 $('#empty').style.display=list.length?'none':'block';
 $('#count').textContent=`${list.length} de ${D.items.length}`;
 document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.dataset.c===active))}
$('#q').oninput=render;
$('#foot').textContent=`${D.items.length} marcadores · ${D.cats.length} categorías · curados ${new Date().toLocaleDateString('es-ES')}`;
renderChips();render();
</script></body></html>
